<meta property="og:title" content="Ratehub.ca — Smarter Financial Choices, Simplified.">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: var(--rh-coconut); font-family: var(--rh-font-sans); }
  button, input, select, textarea { font-family: inherit; }
  img { display: block; max-width: 100%; }
  html { scroll-behavior: smooth; }

  .rh-section-divider { border: none; border-top: 1px solid var(--rh-stone-light); margin: 0; }
  .rh-rate-row { transition: background 200ms; }
  .rh-rate-row:hover { background: var(--rh-stone-lightest) !important; }
  .rh-award-item { transition: opacity 280ms; opacity: .65; }
  .rh-award-item:hover { opacity: 1; }
  *:focus-visible { outline: 3px solid rgba(0,181,214,0.6); outline-offset: 2px; border-radius: 4px; }
  .rh-vertical-eyebrow {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .12em; color: var(--rh-stone-darkest); margin-bottom: 6px;
  }
</style>

<!-- React 18 + Babel standalone (no build step required) -->

</head>
