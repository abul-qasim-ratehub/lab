<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Blueberry (primary)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:20px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--rh-stone-light);}
  .chip{height:72px;}
  .meta{padding:8px 10px;background:var(--rh-coconut);}
  .name{font-size:12px;font-weight:500;color:var(--rh-blackberry);}
  .hex{font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);}
  h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rh-stone-darkest);margin:0 0 12px;font-weight:500;}
</style></head>
<body>
<div class="card">
<h3>Blueberry — brand primary (teal/cyan)</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#dbf9ff"></div><div class="meta"><div class="name">lightest</div><div class="hex">#DBF9FF</div></div></div>
  <div class="sw"><div class="chip" style="background:#a4f1ff"></div><div class="meta"><div class="name">light</div><div class="hex">#A4F1FF</div></div></div>
  <div class="sw"><div class="chip" style="background:#00b5d6"></div><div class="meta"><div class="name">blueberry</div><div class="hex">#00B5D6</div></div></div>
  <div class="sw"><div class="chip" style="background:#00729e"></div><div class="meta"><div class="name">dark</div><div class="hex">#00729E</div></div></div>
  <div class="sw"><div class="chip" style="background:#004f6e"></div><div class="meta"><div class="name">darkest</div><div class="hex">#004F6E</div></div></div>
</div>
</div>
</body></html>
