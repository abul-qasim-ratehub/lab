<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Mint & Lime (growth / savings)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:18px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--rh-stone-light);}
  .chip{height:52px;}
  .meta{padding:6px 8px;background:var(--rh-coconut);}
  .name{font-size:11px;font-weight:500;}
  .hex{font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);}
  h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rh-stone-darkest);margin:0 0 8px;font-weight:500;}
</style></head>
<body>
<div class="card">
<h3>Mint — soft growth / success-soft</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5fffa"></div><div class="meta"><div class="name">lightest</div><div class="hex">#F5FFFA</div></div></div>
  <div class="sw"><div class="chip" style="background:#e0fff5"></div><div class="meta"><div class="name">light</div><div class="hex">#E0FFF5</div></div></div>
  <div class="sw"><div class="chip" style="background:#9ffcdf"></div><div class="meta"><div class="name">mint</div><div class="hex">#9FFCDF</div></div></div>
  <div class="sw"><div class="chip" style="background:#68e9c1"></div><div class="meta"><div class="name">dark</div><div class="hex">#68E9C1</div></div></div>
  <div class="sw"><div class="chip" style="background:#3ea592"></div><div class="meta"><div class="name">darkest</div><div class="hex">#3EA592</div></div></div>
</div>
<h3>Lime — savings / success</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#d3f7e2"></div><div class="meta"><div class="name">lightest</div><div class="hex">#D3F7E2</div></div></div>
  <div class="sw"><div class="chip" style="background:#a7e8c2"></div><div class="meta"><div class="name">light</div><div class="hex">#A7E8C2</div></div></div>
  <div class="sw"><div class="chip" style="background:#4ab879"></div><div class="meta"><div class="name">lime</div><div class="hex">#4AB879</div></div></div>
  <div class="sw"><div class="chip" style="background:#358255"></div><div class="meta"><div class="name">dark</div><div class="hex">#358255</div></div></div>
  <div class="sw"><div class="chip" style="background:#1f5f39"></div><div class="meta"><div class="name">darkest</div><div class="hex">#1F5F39</div></div></div>
</div>
</div>
</body></html>
