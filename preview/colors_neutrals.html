<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Neutrals (Coconut, Blackberry, Stone)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:18px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--rh-stone-light);}
  .chip{height:52px;}
  .meta{padding:6px 8px;background:var(--rh-coconut);}
  .name{font-size:11px;font-weight:500;}
  .hex{font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);}
  h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rh-stone-darkest);margin:0 0 8px;font-weight:500;}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
</style></head>
<body>
<div class="card">
<h3>Coconut & Blackberry</h3>
<div class="pair">
  <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><div class="name">coconut</div><div class="hex">#FFFFFF — page bg</div></div></div>
  <div class="sw"><div class="chip" style="background:#000000"></div><div class="meta"><div class="name">blackberry</div><div class="hex">#000000 — fg</div></div></div>
</div>
<h3>Stone — cool neutral borders & surfaces</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5f9fa"></div><div class="meta"><div class="name">lightest</div><div class="hex">#F5F9FA</div></div></div>
  <div class="sw"><div class="chip" style="background:#e5eff1"></div><div class="meta"><div class="name">light</div><div class="hex">#E5EFF1</div></div></div>
  <div class="sw"><div class="chip" style="background:#c0ced3"></div><div class="meta"><div class="name">stone</div><div class="hex">#C0CED3</div></div></div>
  <div class="sw"><div class="chip" style="background:#a4b4ba"></div><div class="meta"><div class="name">dark</div><div class="hex">#A4B4BA</div></div></div>
  <div class="sw"><div class="chip" style="background:#6a787c"></div><div class="meta"><div class="name">darkest</div><div class="hex">#6A787C</div></div></div>
</div>
</div>
</body></html>
