<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Watermelon, Strawberry & Grape</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:14px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--rh-stone-light);}
  .chip{height:44px;}
  .meta{padding:5px 8px;background:var(--rh-coconut);}
  .name{font-size:11px;font-weight:500;}
  .hex{font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);}
  h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rh-stone-darkest);margin:0 0 6px;font-weight:500;}
</style></head>
<body>
<div class="card">
<h3>Watermelon</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#ffedef"></div><div class="meta"><div class="name">lightest</div><div class="hex">#FFEDEF</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffc7cc"></div><div class="meta"><div class="name">light</div><div class="hex">#FFC7CC</div></div></div>
  <div class="sw"><div class="chip" style="background:#ff989b"></div><div class="meta"><div class="name">watermelon</div><div class="hex">#FF989B</div></div></div>
  <div class="sw"><div class="chip" style="background:#e56b6f"></div><div class="meta"><div class="name">dark</div><div class="hex">#E56B6F</div></div></div>
  <div class="sw"><div class="chip" style="background:#d2484c"></div><div class="meta"><div class="name">darkest</div><div class="hex">#D2484C</div></div></div>
</div>
<h3>Strawberry — error / alert</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#ffa69d"></div><div class="meta"><div class="name">lightest</div><div class="hex">#FFA69D</div></div></div>
  <div class="sw"><div class="chip" style="background:#ff6e59"></div><div class="meta"><div class="name">light</div><div class="hex">#FF6E59</div></div></div>
  <div class="sw"><div class="chip" style="background:#f6452c"></div><div class="meta"><div class="name">strawberry</div><div class="hex">#F6452C</div></div></div>
  <div class="sw"><div class="chip" style="background:#d82e15"></div><div class="meta"><div class="name">dark</div><div class="hex">#D82E15</div></div></div>
  <div class="sw"><div class="chip" style="background:#ab1b00"></div><div class="meta"><div class="name">darkest</div><div class="hex">#AB1B00</div></div></div>
</div>
<h3>Grape — secondary accent</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fbeeff"></div><div class="meta"><div class="name">lightest</div><div class="hex">#FBEEFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#ecd1f4"></div><div class="meta"><div class="name">light</div><div class="hex">#ECD1F4</div></div></div>
  <div class="sw"><div class="chip" style="background:#b969d1"></div><div class="meta"><div class="name">grape</div><div class="hex">#B969D1</div></div></div>
  <div class="sw"><div class="chip" style="background:#80209c"></div><div class="meta"><div class="name">dark</div><div class="hex">#80209C</div></div></div>
  <div class="sw"><div class="chip" style="background:#550a6b"></div><div class="meta"><div class="name">darkest</div><div class="hex">#550A6B</div></div></div>
</div>
</div>
</body></html>
