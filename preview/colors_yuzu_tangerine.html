<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Yuzu & Tangerine</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:18px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--rh-stone-light);}
  .chip{height:52px;}
  .meta{padding:6px 8px;background:var(--rh-coconut);}
  .name{font-size:11px;font-weight:500;}
  .hex{font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);}
  h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rh-stone-darkest);margin:0 0 8px;font-weight:500;}
</style></head>
<body>
<div class="card">
<h3>Yuzu — rewards / highlight</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fff4da"></div><div class="meta"><div class="name">lightest</div><div class="hex">#FFF4DA</div></div></div>
  <div class="sw"><div class="chip" style="background:#fde4a7"></div><div class="meta"><div class="name">light</div><div class="hex">#FDE4A7</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffcc50"></div><div class="meta"><div class="name">yuzu</div><div class="hex">#FFCC50</div></div></div>
  <div class="sw"><div class="chip" style="background:#fcb60a"></div><div class="meta"><div class="name">dark</div><div class="hex">#FCB60A</div></div></div>
  <div class="sw"><div class="chip" style="background:#e7a400"></div><div class="meta"><div class="name">darkest</div><div class="hex">#E7A400</div></div></div>
</div>
<h3>Tangerine — warmth / warning</h3>
<div class="row">
  <div class="sw"><div class="chip" style="background:#ffe7c8"></div><div class="meta"><div class="name">lightest</div><div class="hex">#FFE7C8</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffbc68"></div><div class="meta"><div class="name">light</div><div class="hex">#FFBC68</div></div></div>
  <div class="sw"><div class="chip" style="background:#ff9300"></div><div class="meta"><div class="name">tangerine</div><div class="hex">#FF9300</div></div></div>
  <div class="sw"><div class="chip" style="background:#ea7000"></div><div class="meta"><div class="name">dark</div><div class="hex">#EA7000</div></div></div>
  <div class="sw"><div class="chip" style="background:#cd5b00"></div><div class="meta"><div class="name">darkest</div><div class="hex">#CD5B00</div></div></div>
</div>
</div>
</body></html>
