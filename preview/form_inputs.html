<!doctype html>
<html><head><meta charset="utf-8">
<title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:22px 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:12px;color:var(--rh-blackberry-light);font-weight:500;}
  .in{padding:12px 14px;border-radius:8px;border:1px solid var(--rh-stone);background:#fff;font-family:var(--rh-font-sans);font-size:15px;color:var(--rh-blackberry);transition:border-color 300ms,box-shadow 300ms;}
  .in:focus{outline:none;border-color:var(--rh-blueberry);box-shadow:var(--rh-shadow-focus);}
  .in.error{border-color:var(--rh-error);}
  .hint{font-size:11px;color:var(--rh-stone-darkest);}
  .err{font-size:11px;color:var(--rh-error);}
  .in.disabled{background:var(--rh-stone-lightest);color:var(--rh-stone-darkest);cursor:not-allowed;}
</style></head>
<body>
<div class="card">
  <div class="field"><label>Postal code</label><input class="in" value="M5V 2A8"/></div>
  <div class="field"><label>Home value</label><input class="in" value="$750,000"/></div>
  <div class="field"><label>Email</label><input class="in error" value="you@"/><span class="err">Please enter a valid email</span></div>
  <div class="field"><label>Province</label><input class="in disabled" value="Ontario" disabled/></div>
</div>
</body></html>
