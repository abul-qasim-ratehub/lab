<!doctype html>
<html><head><meta charset="utf-8">
<title>Iconography — circle-in-circle</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:16px 20px;display:grid;grid-template-columns:repeat(10,1fr);gap:10px 8px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--rh-blueberry-dark);}
  .ic img{width:38px;height:38px;}
  .n{font-size:9px;color:var(--rh-stone-darkest);font-family:var(--rh-font-mono);}
</style></head>
<body>
<div class="card">
  <div class="ic"><img src="../assets/icons/house.svg"><span class="n">house</span></div>
  <div class="ic"><img src="../assets/icons/credit-card.svg"><span class="n">credit-card</span></div>
  <div class="ic"><img src="../assets/icons/piggy.svg"><span class="n">piggy</span></div>
  <div class="ic"><img src="../assets/icons/shield.svg"><span class="n">shield</span></div>
  <div class="ic"><img src="../assets/icons/car.svg"><span class="n">car</span></div>
  <div class="ic"><img src="../assets/icons/dollar.svg"><span class="n">dollar</span></div>
  <div class="ic"><img src="../assets/icons/calculator.svg"><span class="n">calculator</span></div>
  <div class="ic"><img src="../assets/icons/search.svg"><span class="n">search</span></div>
  <div class="ic"><img src="../assets/icons/lock.svg"><span class="n">lock</span></div>
  <div class="ic"><img src="../assets/icons/star.svg"><span class="n">star</span></div>
  <div class="ic"><img src="../assets/icons/user.svg"><span class="n">user</span></div>
  <div class="ic"><img src="../assets/icons/phone.svg"><span class="n">phone</span></div>
  <div class="ic"><img src="../assets/icons/map-pin.svg"><span class="n">map-pin</span></div>
  <div class="ic"><img src="../assets/icons/plane.svg"><span class="n">plane</span></div>
  <div class="ic"><img src="../assets/icons/umbrella.svg"><span class="n">umbrella</span></div>
  <div class="ic"><img src="../assets/icons/trending.svg"><span class="n">trending</span></div>
  <div class="ic"><img src="../assets/icons/maple-leaf.svg"><span class="n">maple-leaf</span></div>
  <div class="ic"><img src="../assets/icons/checkmark.svg"><span class="n">checkmark</span></div>
  <div class="ic"><img src="../assets/icons/gift.svg"><span class="n">gift</span></div>
  <div class="ic"><img src="../assets/icons/trophy.svg"><span class="n">trophy</span></div>
  <div class="ic"><img src="../assets/icons/award.svg"><span class="n">award</span></div>
  <div class="ic"><img src="../assets/icons/wallet.svg"><span class="n">wallet</span></div>
  <div class="ic"><img src="../assets/icons/light-bulb.svg"><span class="n">light-bulb</span></div>
  <div class="ic"><img src="../assets/icons/lightning.svg"><span class="n">lightning</span></div>
  <div class="ic"><img src="../assets/icons/heart.svg"><span class="n">heart</span></div>
  <div class="ic"><img src="../assets/icons/bar-chart.svg"><span class="n">bar-chart</span></div>
  <div class="ic"><img src="../assets/icons/conversation.svg"><span class="n">conversation</span></div>
  <div class="ic"><img src="../assets/icons/speech-bubble.svg"><span class="n">speech</span></div>
  <div class="ic"><img src="../assets/icons/question-mark.svg"><span class="n">question</span></div>
  <div class="ic"><img src="../assets/icons/refresh.svg"><span class="n">refresh</span></div>
</div>
</body></html>
