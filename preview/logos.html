<!doctype html>
<html><head><meta charset="utf-8">
<title>Logos — Ratehub family</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .box{border:1px solid var(--rh-stone-light);border-radius:12px;padding:18px 22px;display:flex;align-items:center;justify-content:center;min-height:64px;}
  .box.dark{background:var(--rh-blueberry-darkest);}
  .box img{max-height:28px;max-width:100%;}
  .lbl{position:absolute;font-family:var(--rh-font-mono);font-size:10px;color:var(--rh-stone-darkest);margin:-14px 0 0 10px;}
  .pair{position:relative;}
</style></head>
<body>
<div class="card">
  <div class="pair"><div class="box"><img src="../assets/logos/ratehub_full_dark.svg"></div><span class="lbl">ratehub · dark</span></div>
  <div class="pair"><div class="box dark"><img src="../assets/logos/ratehub_full_light.svg"></div><span class="lbl">ratehub · light</span></div>
  <div class="pair"><div class="box"><img src="../assets/logos/canwise_light.svg" style="filter:invert(1)"></div><span class="lbl">canwise / mortgage brokerage</span></div>
  <div class="pair"><div class="box"><img src="../assets/logos/moneysense_light.svg" style="filter:invert(1)"></div><span class="lbl">moneysense</span></div>
  <div class="pair"><div class="box dark"><img src="../assets/logos/rh_insurance_light.svg"></div><span class="lbl">rh insurance</span></div>
  <div class="pair"><div class="box"><img src="../assets/logos/ratehub_lettermark_dark.svg" style="max-height:36px"></div><span class="lbl">lettermark "r"</span></div>
</div>
</body></html>
