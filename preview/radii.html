<!doctype html>
<html><head><meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);font-family:var(--rh-font-sans);}
  .card{padding:22px 28px;display:flex;align-items:flex-end;gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:var(--rh-blueberry-lightest);border:1px solid var(--rh-blueberry-dark);}
  .tok{font-family:var(--rh-font-mono);font-size:11px;color:var(--rh-stone-darkest);}
  .px{font-size:11px;font-weight:500;}
</style></head>
<body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="tok">radius-xs</div><div class="px">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="tok">radius-s</div><div class="px">8px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="tok">radius-m</div><div class="px">12px · inputs</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="tok">radius-l</div><div class="px">16px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="tok">radius-xl</div><div class="px">24px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="tok">radius-full</div><div class="px">pills</div></div>
</div>
</body></html>
