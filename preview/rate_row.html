<!doctype html>
<html><head><meta charset="utf-8">
<title>Mortgage rate row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-stone-lightest);font-family:var(--rh-font-sans);}
  .card{padding:18px 28px;}
  .row{background:#fff;border:1px solid var(--rh-stone-light);border-radius:12px;padding:18px 22px;display:grid;grid-template-columns:140px 1fr 1fr 1fr auto;gap:22px;align-items:center;box-shadow:var(--rh-shadow-xs);}
  .logo{height:34px;display:flex;align-items:center;font-weight:700;font-size:18px;color:var(--rh-blueberry-darkest);letter-spacing:-.01em;}
  .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--rh-stone-darkest);font-weight:500;}
  .v{font-size:22px;font-weight:700;color:var(--rh-blackberry);line-height:1.2;}
  .v small{font-size:13px;font-weight:400;color:var(--rh-stone-darkest);}
  .cta{background:#2d6e8a;color:#fff;border:none;border-radius:8px;padding:12px 22px;font-weight:500;font-size:14px;cursor:pointer;font-family:inherit;}
  .tagline{margin-top:6px;display:inline-flex;gap:6px;align-items:center;font-size:11px;background:var(--rh-lime-lightest);color:var(--rh-lime-darkest);padding:3px 10px;border-radius:9999px;font-weight:500;}
</style></head>
<body>
<div class="card">
  <div class="row">
    <div><div class="logo">Butler<br/>Mortgage</div><div class="tagline">Best rate</div></div>
    <div><div class="k">5-yr fixed</div><div class="v">4.39<small>%</small></div></div>
    <div><div class="k">Monthly payment</div><div class="v">$2,493<small>/mo</small></div></div>
    <div><div class="k">Save vs big bank</div><div class="v" style="color:var(--rh-lime-dark)">$13,384</div></div>
    <button class="cta">View rate →</button>
  </div>
</div>
</body></html>
