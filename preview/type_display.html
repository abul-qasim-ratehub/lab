<!doctype html>
<html><head><meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);}
  .card{padding:20px 28px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{min-width:80px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--rh-stone-darkest);font-weight:500;}
  .spec{font-family:var(--rh-font-mono);font-size:11px;color:var(--rh-stone-darkest);margin-left:auto;}
</style></head>
<body>
<div class="card">
  <div class="row"><span class="label">4xl / 700</span><span class="rh-title-4xl showDot">Save smart</span><span class="spec">48 / 1.2</span></div>
  <div class="row"><span class="label">3xl / 700</span><span class="rh-title-3xl">Compare rates.</span><span class="spec">38 / 1.2</span></div>
  <div class="row"><span class="label">2xl / 500</span><span class="rh-title-2xl">Find your mortgage</span><span class="spec">32 / 1.2</span></div>
  <div class="row"><span class="label">l / 500</span><span class="rh-title-l">Section header</span><span class="spec">26 / 1.5</span></div>
  <div class="row"><span class="label">m / 500</span><span class="rh-title-m">Card title</span><span class="spec">24 / 1.5</span></div>
</div>
</body></html>
