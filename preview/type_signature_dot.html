<!doctype html>
<html><head><meta charset="utf-8">
<title>Type — Signature dot</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rh-coconut);}
  .card{padding:32px 40px;display:flex;flex-direction:column;gap:10px;}
  .headline{font-size:60px;font-weight:700;line-height:1;letter-spacing:-0.01em;}
  .note{font-family:var(--rh-font-mono);font-size:11px;color:var(--rh-stone-darkest);}
</style></head>
<body>
<div class="card">
  <div class="headline showDot">Your money, made better</div>
  <div class="note">The <code>.showDot</code> utility adds a blueberry "." after the headline — Ratehub's single most distinctive typographic move. Hero H1 only.</div>
</div>
</body></html>
